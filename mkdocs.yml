site_name: Провайдер Zvuk Music для Music Assistant
site_url: https://trudenboy.github.io/ma-provider-zvuk-music/
repo_url: https://github.com/trudenboy/ma-provider-zvuk-music
repo_name: trudenboy/ma-provider-zvuk-music
edit_uri: edit/dev/docs/

theme:
  name: material
  language: ru
  font: false
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Тёмная тема
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Светлая тема
  features:
    - navigation.tabs
    - navigation.sections
    - content.tabs.link

extra_css:
  - stylesheets/extra.css

plugins:
  - search

markdown_extensions:
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences
  - admonition
  - tables
  - toc:
      permalink: true

nav:
  - Главная: index.md
  - Настройка: configuration.md
  - Известные проблемы: known-issues.md
  - Разработка:
      - Настройка окружения: development.md
      - Docker: dev-docker.md
      - Тестирование: testing.md
      - Вклад в разработку: contributing.md
      - Управление инцидентами: incident-management.md
