name: Test
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    permissions:
      issues: write  # required for report-failure in reusable-test.yml
    uses: trudenboy/ma-provider-tools/.github/workflows/reusable-test.yml@main
    with:
      provider_type: music_provider
      provider_domain: zvuk_music
      provider_path: provider/
      manifest_path: provider/manifest.json
