name: Test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main, dev]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  issues: write  # Required by report-failure job in reusable workflow

jobs:
  test:
    uses: trudenboy/ma-provider-tools/.github/workflows/reusable-test.yml@main
    with:
      provider_type: music_provider
      provider_domain: zvuk_music
      provider_path: provider/
      manifest_path: provider/manifest.json
