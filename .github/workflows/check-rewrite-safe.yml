    paths:
      - "provider/**/*.py"
      - "tests/**/*.py"
      - ".github/workflows/check-rewrite-safe.yml"
  push:
    branches:
      - dev

jobs:
  check:
    uses: trudenboy/ma-provider-tools/.github/workflows/reusable-check-rewrite-safe.yml@main
