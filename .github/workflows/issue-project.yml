name: Auto-add issues to project

on:
  issues:
    types: [labeled]

permissions:
  issues: read

jobs:
  add-to-project:
    if: ${{ startsWith(github.event.label.name, 'incident:') }}
    runs-on: ubuntu-latest
    steps:
      - name: Add to MA Ecosystem project
        env:
          GH_TOKEN: ${{ secrets.FORK_SYNC_PAT }}
        run: |
          gh api graphql -f query='
            mutation($pid:ID!,$iid:ID!){
              addProjectV2ItemById(input:{projectId:$pid,contentId:$iid}){
                item{id}
              }
            }' \
            -f pid="PVT_kwHOCFMIf84BPvYe" \
            -f iid="${{ github.event.issue.node_id }}"
