name: Sync to Fork
on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Target branch in fork (default: integration/dev)"
        default: "integration/dev"
        type: string
      version:
        description: "Version tag (e.g. v2.0.0) — leave empty to use latest release tag"
        default: ""
        type: string
      ack_upstream_ahead:
        description: "Override the preflight guard and sync even if upstream is ahead"
        type: boolean
        default: false

permissions:
  issues: write  # Required by report-failure job in reusable workflow

jobs:
  sync:
    uses: trudenboy/ma-provider-tools/.github/workflows/reusable-sync-to-fork.yml@main
    with:
      manifest_path: provider/manifest.json
      provider_path: provider/

      target_branch: ${{ inputs.target_branch }}
      version: ${{ inputs.version }}
      ack_upstream_ahead: ${{ inputs.ack_upstream_ahead }}

    secrets: inherit
